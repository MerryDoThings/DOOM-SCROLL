<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0a0a0a; --bg-card: #111; --border: #252525; --border-hover: #3a3a3a;
    --text: #ffffff; --text-dim: #e8e8e8; --text-muted: #cccccc; --text-faint: #aaaaaa;
    --red: #e03535; --red-bg: #1a0a0a; --green: #4ca84a; --green-bg: #0a1a0a;
  }
  body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; min-height: 100vh; overflow-x: hidden; }
  #app { max-width: 480px; margin: 0 auto; padding: 0 12px 80px; }

  .app-subtitle { font-size: 10px; color: var(--text-faint); margin: 0 0 10px; font-family: 'Courier New', monospace; letter-spacing: 0.05em; line-height: 1.5; }
  .app-subtitle .pill { color: var(--text-muted); }
  .app-subtitle .pill.found { color: var(--text-dim); }
  .brand { color: var(--text-dim); letter-spacing: 0.22em; }
  .live-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--red); flex-shrink: 0; }
  .iq-stage { margin-left: auto; font-size: 11px; color: var(--text-faint); letter-spacing: 0.05em; text-transform: lowercase; }
  .stats-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; }
  .stat { background: #161616; border: 1px solid #252525; border-radius: 8px; padding: 8px 10px; text-align: center; }
  .stat-val { font-size: 20px; font-weight: 600; color: var(--red); font-family: 'Courier New', monospace; line-height: 1; transition: color 0.4s; }
  .stat-lbl { font-size: 11px; color: var(--text-muted); margin-top: 4px; text-transform: uppercase; letter-spacing: 0.06em; }
  .progress-bar { height: 2px; background: #1e1e1e; margin-top: 10px; border-radius: 1px; overflow: hidden; }
  .progress-fill { height: 100%; background: var(--red); width: 100%; transition: width 0.6s ease; }
  .progress-lbl { font-size: 11px; color: var(--text-faint); margin-top: 4px; font-family: 'Courier New', monospace; text-align: right; letter-spacing: 0.04em; }
  .feed { padding: 14px 0; }
  .news-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 10px; padding: 14px; margin-bottom: 10px; transition: border-color 0.2s; animation: fadeUp 0.3s ease; }
  .news-card:hover { border-color: var(--border-hover); }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
  .news-src { font-size: 11px; color: var(--text-muted); margin-bottom: 5px; font-family: 'Courier New', monospace; text-transform: uppercase; letter-spacing: 0.08em; }
  .news-hl { font-size: 14px; font-weight: 500; color: #ffffff; line-height: 1.45; margin-bottom: 10px; }
  .news-meta { display: flex; align-items: center; gap: 8px; }
  .news-tag { font-size: 11px; padding: 3px 7px; border-radius: 4px; background: #1a1a1a; color: var(--text-muted); border: 1px solid #252525; text-transform: uppercase; letter-spacing: 0.05em; }
  .news-time { font-size: 11px; color: var(--text-faint); margin-left: auto; font-family: 'Courier New', monospace; }
  .news-card.peak { border-left: 2px solid var(--red); }
  .news-card.peak .news-hl { color: #ffdddd; font-style: italic; }

  .news-card.lercio { border-left: 2px solid #d4a017; background: #131108; }
  .news-card.lercio .news-hl { color: #fff8e8; }
  .news-card.lercio .news-src { color: #c8920a; letter-spacing: 0.12em; }
  .news-card.lercio .news-tag { background: #1e1800; color: #c8920a; border-color: #2e2400; }
  .news-card.lercio::before { content: 'SATIRA'; display: inline-block; font-size: 9px; font-family: 'Courier New', monospace; color: #c8920a; background: #2a1e00; border: 1px solid #3a2c00; border-radius: 3px; padding: 1px 5px; letter-spacing: 0.12em; margin-bottom: 7px; }
  .promo-card { background: linear-gradient(135deg, #21180b 0%, #1a1a1a 58%, #17100c 100%); border: 1px dashed #b9822d; border-radius: 10px; padding: 14px; margin-bottom: 10px; cursor: pointer; transition: all 0.2s; animation: fadeUp 0.3s ease; box-shadow: 0 0 0 1px rgba(185,130,45,.12); }
  .promo-card::before { content: 'SPONSOR WELLNESS / TRAPPOLA DI LUCIDITÀ'; display: block; font-size: 10px; color: #d8bd77; letter-spacing: .16em; font-family: 'Courier New', monospace; margin-bottom: 7px; opacity: .9; }
  .promo-card:hover { border-color: #666; }
  .promo-label { font-size: 10px; color: #c8a045; text-transform: uppercase; letter-spacing: 0.15em; margin-bottom: 5px; font-family: 'Courier New', monospace; }
  .promo-title { font-size: 14px; font-weight: 600; color: #fff5e0; margin-bottom: 4px; }
  .promo-desc { font-size: 12px; color: #d4be9a; margin-bottom: 8px; line-height: 1.4; }
  .promo-cta { display: inline-block; font-size: 11px; padding: 5px 12px; background: #2a2015; color: #c8a045; border-radius: 4px; border: 1px solid #443015; font-weight: 500; text-transform: uppercase; letter-spacing: 0.05em; }
  .quiz-card { background: var(--bg-card); border: 1px solid #2a3a2a; border-left: 2px solid #5a8a5a; border-radius: 10px; padding: 14px; margin-bottom: 10px; animation: fadeUp 0.3s ease; }
  .quiz-label { font-size: 11px; color: #6fa66f; margin-bottom: 6px; font-family: 'Courier New', monospace; text-transform: uppercase; letter-spacing: 0.08em; }
  .quiz-q { font-size: 14px; color: #ffffff; line-height: 1.45; margin-bottom: 12px; }
  .quiz-options { display: flex; flex-direction: column; gap: 6px; }
  .quiz-btn { background: #161616; border: 1px solid #2e2e2e; color: #e8e8e8; padding: 9px 12px; border-radius: 6px; text-align: left; cursor: pointer; font-size: 12px; font-family: inherit; transition: all 0.15s; }
  .quiz-btn:hover { background: #1e1e1e; border-color: #444; color: #ffffff; }
  .quiz-btn.answered-wrong { border-color: var(--red); background: var(--red-bg); color: #ffffff; cursor: default; }
  .quiz-btn.answered-right { border-color: var(--green); background: var(--green-bg); color: #ffffff; cursor: default; }
  .quiz-btn:disabled { opacity: 0.4; cursor: default; }
  .quiz-feedback { font-size: 11px; color: var(--text-muted); font-family: 'Courier New', monospace; margin-top: 8px; font-style: italic; }
  .load-more { width: 100%; padding: 13px; background: var(--bg-card); border: 1px solid #252525; border-radius: 8px; color: var(--text-muted); font-size: 12px; cursor: pointer; margin-top: 4px; font-family: 'Courier New', monospace; letter-spacing: 0.04em; transition: border-color 0.2s, color 0.2s; }
  .load-more:hover { border-color: var(--red); color: var(--text-dim); }
  .load-more.glitch-1 { animation: glitch1 0.3s; }
  .load-more.glitch-2 { animation: glitch2 0.3s; }
  .load-more.glitch-3 { animation: glitch3 0.3s; color: #ff4040 !important; border-color: var(--red) !important; }
  @keyframes glitch1 { 0%,100% { transform: translateX(0); } 50% { transform: translateX(-1px); } }
  @keyframes glitch2 { 0%,100% { transform: translateX(0); } 25% { transform: translateX(2px); } 75% { transform: translateX(-2px); } }
  @keyframes glitch3 { 0%,100% { transform: translateX(0); text-shadow: none; } 33% { transform: translateX(-3px); text-shadow: 2px 0 var(--red); } 66% { transform: translateX(3px); text-shadow: -2px 0 #4040ff; } }
  .brain-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); display: none; align-items: center; justify-content: center; z-index: 100; padding: 20px; animation: fadeIn 0.4s ease; }
  .brain-overlay.active { display: flex; }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  .brain-modal { background: var(--bg); border: 1px solid var(--text-dim); border-radius: 12px; padding: 24px; max-width: 420px; width: 100%; animation: scaleIn 0.3s ease; }
  @keyframes scaleIn { from { transform: scale(0.95); opacity: 0; } to { transform: scale(1); opacity: 1; } }
  .brain-label { font-size: 10px; color: var(--text-dim); font-family: 'Courier New', monospace; text-transform: uppercase; letter-spacing: 0.15em; margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
  .brain-label::before { content: '◉'; color: var(--text-dim); animation: pulse 1.5s infinite; }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }
  .brain-msg { font-size: 16px; color: var(--text); font-family: 'Courier New', monospace; line-height: 1.6; margin-bottom: 20px; min-height: 60px; }
  .brain-actions { display: flex; gap: 8px; }
  .brain-btn { flex: 1; padding: 11px; border-radius: 8px; border: 1px solid; background: transparent; cursor: pointer; font-size: 12px; font-family: 'Courier New', monospace; text-transform: uppercase; letter-spacing: 0.05em; transition: all 0.2s; }
  .brain-btn.listen { border-color: var(--green); color: var(--green); }
  .brain-btn.listen:hover { background: var(--green-bg); }
  .brain-btn.ignore { border-color: var(--text-faint); color: var(--text-muted); }
  .brain-btn.ignore:hover { background: var(--red-bg); border-color: var(--red); color: var(--red); }
  /* ── Ending overlay base ── */
  .ending-overlay { position: fixed; inset: 0; display: none; align-items: center; justify-content: center; z-index: 200; padding: 24px 20px; overflow-y: auto; }
  .ending-overlay.active { display: flex; }
  .ending-inner { width: 100%; max-width: 420px; text-align: center; }

  /* ── Stats block (shared, inherits color from parent) ── */
  .ending-stats { margin: 28px auto 10px; padding: 12px 0; border-top: 1px solid currentColor; border-bottom: 1px solid currentColor; opacity: 0.55; max-width: 300px; font-size: 12px; font-family: 'Courier New', monospace; }
  .ending-stats div { display: flex; justify-content: space-between; padding: 3px 0; }

  .ending-restart:hover, .ending-share:hover { opacity: 0.65; }

  /* ── NIRVANA — quasi vuoto, freddo, cinico ── */

  .ending-nirvana .e-iq { font-size: 96px; font-family: 'Courier New', monospace; font-weight: 700; color: #222; line-height: 1; margin-bottom: 40px; }
  .ending-nirvana .e-title { font-size: 13px; font-family: 'Courier New', monospace; letter-spacing: 0.25em; color: #555; margin-bottom: 32px; text-transform: uppercase; }
  .ending-nirvana .e-body { font-size: 14px; line-height: 2; color: #888; max-width: 340px; margin: 0 auto; }
  .ending-nirvana .e-body em { color: #555; font-style: normal; display: block; margin-top: 8px; }
  .ending-nirvana .ending-stats { border-color: #222; }
  .ending-nirvana .ending-restart, .ending-nirvana .ending-share { border-color: #333; color: #555; }

  /* ── SMETTI — diagnosi cinica, clinical ── */
  .ending-overlay.ending-smetti { background: #0f0f0f; color: #e0e0e0; flex-direction: column; }
  .ending-smetti .ending-inner { text-align: left; }

  .ending-smetti .e-conclusion strong { color: #e03535; font-weight: normal; }

  /* ── QUIT — natura, pomposo, touch grass ── */
  .ending-overlay.ending-quit { background: #070e07; color: #c8f0c8; flex-direction: column; }
  .ending-quit .ending-inner { position: relative; padding-bottom: 20px; }
  .ending-quit .e-label { font-size: 10px; font-family: 'Courier New', monospace; letter-spacing: 0.25em; color: #2a4a2a; margin-bottom: 20px; }
  .ending-quit .e-title { font-size: 22px; font-family: 'Courier New', monospace; color: #4aff4a; letter-spacing: 0.08em; margin-bottom: 8px; text-shadow: 0 0 20px rgba(74,255,74,0.3); }

  .ending-quit .e-achievement { background: #0d1a0d; border: 1px solid #1a3a1a; border-radius: 8px; padding: 10px 16px; margin: 6px auto; max-width: 320px; text-align: left; display: flex; align-items: center; gap: 12px; }
  .ending-quit .e-achievement .e-icon { font-size: 18px; flex-shrink: 0; }
  .ending-quit .e-achievement .e-ach-text { font-size: 12px; color: #88cc88; line-height: 1.4; }
  .ending-quit .e-achievement .e-ach-title { font-size: 13px; color: #c8f0c8; font-weight: 600; }
  .ending-quit .e-grass { margin: 24px auto 0; opacity: 0.35; }
  .ending-quit .ending-stats { border-color: #1a3a1a; color: #4a8a4a; }
  .ending-quit .ending-restart, .ending-quit .ending-share { border-color: #2a4a2a; color: #6ab06a; }

  /* ── CAPITALISMO SPIRITUALE — wellness landing page ── */
  .ending-overlay.ending-capitalismo { background: #faf5e8; color: #2a1a00; flex-direction: column; }
  .ending-capitalismo .ending-inner { text-align: center; }
  .ending-capitalismo .e-kicker { font-size: 10px; letter-spacing: 0.25em; color: #c8920a; font-family: 'Courier New', monospace; text-transform: uppercase; margin-bottom: 8px; }
  .ending-capitalismo .e-logo { font-size: 28px; font-weight: 800; color: #1a0a00; letter-spacing: -0.02em; margin-bottom: 4px; font-family: -apple-system, BlinkMacSystemFont, sans-serif; }
  .ending-capitalismo .e-tagline { font-size: 12px; color: #c8920a; margin-bottom: 20px; font-style: italic; }
  .ending-capitalismo .e-stars { color: #d4a017; font-size: 18px; letter-spacing: 2px; margin-bottom: 6px; }
  .ending-capitalismo .e-reviews { font-size: 11px; color: #8a6a30; margin-bottom: 20px; }
  .ending-capitalismo .e-feature { font-size: 13px; color: #3a2a10; line-height: 1.7; padding: 6px 0; border-bottom: 1px solid #e8d8b0; max-width: 320px; margin: 0 auto; text-align: left; display: flex; gap: 10px; }
  .ending-capitalismo .e-feature::before { content: '✓'; color: #c8920a; flex-shrink: 0; }
  .ending-capitalismo .e-price-block { margin: 20px auto; max-width: 280px; background: #fff8e8; border: 1px solid #e8d0a0; border-radius: 12px; padding: 16px; }
  .ending-capitalismo .e-price-old { font-size: 14px; color: #aaa; text-decoration: line-through; margin-bottom: 2px; }
  .ending-capitalismo .e-price { font-size: 28px; font-weight: 800; color: #c8920a; font-family: -apple-system, BlinkMacSystemFont, sans-serif; }

  .ending-capitalismo .e-cta { display: block; width: 100%; max-width: 280px; margin: 12px auto 0; padding: 14px; background: #c8920a; color: #fff; border: none; border-radius: 8px; font-size: 13px; font-weight: 600; letter-spacing: 0.05em; cursor: default; font-family: -apple-system, BlinkMacSystemFont, sans-serif; }
  .ending-capitalismo .e-fine-print { font-size: 10px; color: #b0a080; margin-top: 8px; font-style: italic; }
  .ending-capitalismo .ending-stats { border-color: #e8d0a0; color: #8a6a30; }
  .ending-capitalismo .ending-restart, .ending-capitalismo .ending-share { border-color: #d4a040; color: #8a6a30; }

  /* ── BRAINROT — chaos ── */
  .ending-overlay.ending-brainrot { background: #000; color: #fff; flex-direction: column; overflow: hidden; position: relative; }
  .ending-brainrot .ending-inner { position: relative; z-index: 2; }
  .ending-brainrot .e-chaos { position: absolute; inset: 0; pointer-events: none; overflow: hidden; z-index: 1; }
  .ending-brainrot .e-chaos span { position: absolute; font-family: 'Courier New', monospace; animation: brainrotFloat linear infinite; opacity: 0; white-space: nowrap; }
  @keyframes brainrotFloat { 0% { opacity: 0; transform: translateY(0) rotate(var(--rot)); } 10% { opacity: 1; } 90% { opacity: 0.6; } 100% { opacity: 0; transform: translateY(-120vh) rotate(calc(var(--rot) + 20deg)); } }
  .ending-brainrot .e-title { font-size: 11px; font-family: 'Courier New', monospace; letter-spacing: 0.3em; color: #ff3030; text-transform: uppercase; margin-bottom: 16px; animation: glitch2 2s infinite; }

  .ending-brainrot .ending-restart, .ending-brainrot .ending-share { border-color: #ff3030; color: #ff3030; }

  .news-comment { margin-top: 9px; padding-top: 8px; border-top: 1px solid #1e1e1e; font-size: 11px; color: #707070; line-height: 1.35; font-family: 'Courier New', monospace; }

  .toast-wrap { position: fixed; left: 50%; bottom: 18px; transform: translateX(-50%); z-index: 300; width: min(440px, calc(100vw - 24px)); pointer-events: none; }

<body>
<div id="app">
  <div class="header">
    <div class="app-title">
      <span class="live-dot" id="liveDot"></span>
      <span class="brand">DOOM/SCROLL</span>
      <span class="iq-stage" id="iqStage">cosciente</span>
    </div>
    <div class="app-subtitle" id="appSubtitle">scrolla. il QI cala. <span class="pill" id="finalsPill">5 finali da scoprire.</span></div>
    <div class="stats-row">
      <div class="stat"><div class="stat-val" id="iqVal">100</div><div class="stat-lbl">QI residuo</div></div>
      <div class="stat"><div class="stat-val" id="timerVal">00:00</div><div class="stat-lbl">Tempo perso</div></div>
      <div class="stat"><div class="stat-val" id="newsCount">0</div><div class="stat-lbl">Cose viste</div></div>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
    <div class="progress-lbl" id="progressLbl">QI: 100/100</div>
  </div>
  <div class="feed" id="feed"></div>
</div>

<div class="brain-overlay" id="brainOverlay">
  <div class="brain-modal">
    <div class="brain-label">messaggio dal cervello</div>
    <div class="brain-msg" id="brainMsg"></div>
    <div class="brain-actions">
      <button class="brain-btn listen" onclick="listenBrain()">ok smetto</button>
      <button class="brain-btn ignore" onclick="ignoreBrain()">tra un po'</button>
    </div>
  </div>
</div>

<div class="ending-overlay" id="endingOverlay"></div>
<div class="shop-overlay" id="shopOverlay">
  <div class="shop-modal" id="shopModal"></div>
</div>
<div class="toast-wrap" id="toastWrap"></div>

<script>
// Config costanti — restano inline perché piccole e usate subito
const SOURCES = ["IL POST MORTALE","CORRIERE DELLA SERA DI SEMPRE","REPUBBLICA SENZA SPERANZA","ANSA — LE SOLITE COSE","SKY TG24 LOOP INFINITO","FATTO QUOTIDIANO (titolo casuale)","LA STAMPA RIBADITA","MESSAGGERO DEL NULLA"];
const TIMES = ["2 min fa","5 min fa","8 min fa","12 min fa","18 min fa","23 min fa","31 min fa","45 min fa","1 ora fa","2 ore fa","ieri","2 gg fa"];

// Contenuto caricato da content.json
let NEWS_MEH = [], NEWS_INTERESTING = [], NEWS_PEAK = [], NEWS_BRAINROT = [];
let REPEATABLE_NEWS = [], EXTRA_MEH_TOPICS = [], EXTRA_MEH_ENDINGS = [];
let EXTRA_INTERESTING = [], EXTRA_PEAK = [], EXTRA_BRAINROT = [];
let EXTRA_NEWS_MEH_V28 = [], EXTRA_NEWS_INTERESTING_V28 = [];
let EXTRA_NEWS_PEAK_V28 = [], EXTRA_NEWS_BRAINROT_V28 = [];
let FAKE_COMMENTS = [], ADS = [];
let LERCIO_NEWS = []; // caricato da lercio.json
let QUIZZES = []; // caricato da quizzes.json

let BRAIN_MSGS = [], BRAIN_IGNORE_MSGS = [];
const SHOP_WARNINGS = {
  3: ["Terzo acquisto wellness. Forse ascoltare il cervello costa meno e non rinnova automaticamente."],
  4: ["Quarto acquisto. Il carrello sta diventando una terapia sostitutiva.", "Seconda conferma: vuoi davvero comprare un promemoria invece di seguire quello biologico già installato?"],
  5: ["Quinto acquisto. Ultimo bivio prima della santificazione con ricevuta.", "Il cervello è ancora disponibile. Non ha piano annuale.", "Stai per trasformare il problema in abbonamento. Confermi la conversione spirituale?", "Quarta conferma, perché a questo punto la frizione è un servizio pubblico: compri davvero?"],
  default: ["Sicuro? Il cervello sostiene di offrire la stessa funzione gratis, ma senza landing page."]
};

const IQ_STAGES = [[80,"cosciente"],[60,"lievemente intontito"],[40,"mente plastificata"],[20,"vuoto cosmico"],[1,"proto-nirvana"],[0,"nirvana"]];

let iq = 100, minIQ = 100, seconds = 0, newsCount = 0;
let brainListened = 0, brainListenedStreak = 0, brainIgnored = 0, everIgnored = false;
let cardsSinceInterruption = 0;
let mehUsed = [], intUsed = [], peakUsed = [], adUsed = [], quizUsed = [], brainrotUsed = [], lercioUsed = [];
let recentLoadClicks = [];
let gameOver = false, totalLoadMore = 0;
let adClicks = 0, usefulAdClicks = 0, spiritualDebt = 0, adsShown = 0, loadsSinceAd = 0;
let brainrotLevel = 0, doubleClickStreak = 0, lastLoadClickAt = 0;
let scrollLossDebt = 0;
let lastStage = '';
let mainTimerId = null;
let brainTimerId = null;
let interruptionCount = 0;
let pendingPromo = null, pendingPromoElement = null;

const feed = document.getElementById('feed');
const STORAGE_KEY = 'doomscroll_finales';

function showToast(msg, kind='') {
  const wrap = document.getElementById('toastWrap');
  const div = document.createElement('div');
  div.className = 'toast ' + kind;
  div.textContent = msg;
  wrap.appendChild(div);
  setTimeout(() => div.remove(), 2900);
}

function pickItem(items, used, fallbackItems=null) {
  // Non ripetere le notizie normali nella stessa run. Quando finiscono, usa solo déjà-vu studiati.
  if (!items || items.length === 0) {
    const fb = fallbackItems && fallbackItems.length ? fallbackItems[Math.floor(Math.random()*fallbackItems.length)] : ["Feed esaurito. Persino l'algoritmo ha finito le scuse.", "Déjà-vu"];
    return [fb, -1];
  }
  if (used.length >= items.length) {
    const fb = fallbackItems && fallbackItems.length ? fallbackItems[Math.floor(Math.random()*fallbackItems.length)] : ["Hai letto tutto. Il feed adesso si ripete e fa finta sia nostalgia.", "Déjà-vu"];
    return [fb, -1];
  }
  let idx;
  let guard = 0;
  do { idx = Math.floor(Math.random()*items.length); guard++; } while (used.includes(idx) && guard < 1000);
  if (used.includes(idx)) {
    const fb = fallbackItems && fallbackItems.length ? fallbackItems[Math.floor(Math.random()*fallbackItems.length)] : ["Ripetizione di emergenza: il contenuto è finito prima della dipendenza.", "Déjà-vu"];
    return [fb, -1];
  }
  used.push(idx);
  return [items[idx], idx];
}
function timeStr(s) { return String(Math.floor(s/60)).padStart(2,'0') + ':' + String(s%60).padStart(2,'0'); }
function getUnlocked() { try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]'); } catch { return []; } }
function unlockFinal(name) {
  const u = getUnlocked();
  if (!u.includes(name)) { u.push(name); localStorage.setItem(STORAGE_KEY, JSON.stringify(u)); }
}
function updateFinalsPill() {
  const pill = document.getElementById('finalsPill');
  if (!pill) return;
  const u = getUnlocked();
  if (u.length === 0) {
    pill.textContent = '5 finali da scoprire.';
    pill.classList.remove('found');
  } else if (u.length >= 5) {
    pill.textContent = 'tutti e 5 i finali sbloccati. ora scrolli per sport.';
    pill.classList.add('found');
  } else {
    pill.textContent = `${u.length}/5 finali sbloccati. ne mancano ${5 - u.length}.`;
    pill.classList.add('found');
  }
}

function updateIQDisplay() {
  document.getElementById('iqVal').textContent = iq;
  document.getElementById('progressFill').style.width = iq + '%';
  document.getElementById('progressLbl').textContent = `QI: ${iq}/100`;
  let newStage = '';
  for (const [thr, label] of IQ_STAGES) {
    if (iq >= thr) { document.getElementById('iqStage').textContent = label; newStage = label; break; }
  }
  // Quando entri in una nuova fase di degrado, lo dico una volta sola, in modo narrativo.
  if (newStage && newStage !== lastStage) {
    if (lastStage !== '') {
      const stageMsgs = {
        'lievemente intontito': [
          'sei ufficialmente lievemente intontito. ben arrivato.',
          'lievemente intontito. il danno è contenuto. per ora.',
          'transizione completata: cosciente → intontito. il feed ha preso nota.',
        ],
        'mente plastificata': [
          'mente plastificata. il cartone si curva, non si spezza.',
          'mente plastificata. ora le notizie scivolano dentro senza attrito.',
          'mente plastificata. il feed ti trova finalmente gestibile.',
        ],
        'vuoto cosmico': [
          'vuoto cosmico raggiunto. la stanza intorno è facoltativa.',
          'vuoto cosmico. i pensieri ci sono ancora, ma non insistono.',
          'vuoto cosmico. hai trovato il modo più moderno per meditare.',
        ],
        'proto-nirvana': [
          'proto-nirvana. il pollice continua per inerzia spirituale.',
          'proto-nirvana. tecnicamente sei ancora sveglio.',
          'proto-nirvana. a questo punto il feed scorre da solo.',
        ],
        'nirvana': [
          'nirvana. non legge più nemmeno questo toast.',
          'nirvana. il feed ha vinto. il feed ti ringrazia.',
          'nirvana. nessun pensiero è stato disturbato in questa sessione.',
        ],
      };
      const variants = stageMsgs[newStage];
      if (variants) showToast(variants[Math.floor(Math.random()*variants.length)], 'bad');
    }
    lastStage = newStage;
  }
  const iqEl = document.getElementById('iqVal');
  if (iq < 20) iqEl.style.color = '#ff80c0';
  else if (iq < 40) iqEl.style.color = '#ff6060';
  else if (iq < 60) iqEl.style.color = '#ff9040';
  else iqEl.style.color = 'var(--red)';
}
function updateIQ(delta, reason='') {
  if (gameOver) return;
  iq = Math.max(0, Math.min(100, iq + delta));
  if (iq < minIQ) minIQ = iq;
  updateIQDisplay();
  if (reason) showToast((delta > 0 ? '+' : '') + delta + ' QI — ' + reason, delta > 0 ? 'good' : 'bad');
  checkEndings();
}

// Messaggi per lo scroll volontario (cliccare "carica altro").
// Ruotano in ordine così non si ripetono subito, con shuffle iniziale.
const SCROLL_REASONS = [
  'scelta consapevole di continuare',
  'il pollice ha deciso prima del cervello',
  'momentum scrolling rilevato',
  'curiosità irrisolta, costo pagato',
  'un altro carico, un altro taglio',
  'scroll volontario — la responsabilità è tua',
  'nessuno ti ha obbligato. questo è il problema.',
  'hai scelto il feed invece dell\'alternativa',
  'azione muscolare non supportata da intenzione',
  'click effettuato, danno applicato',
].sort(() => Math.random() - 0.5);
let scrollReasonIdx = 0;

function spendScrollIQ() {
  // Media: -1.5 QI per carica altro. Abbastanza lenta da sembrare innocua, abbastanza forte da contare.
  scrollLossDebt += 1.5;
  const loss = Math.floor(scrollLossDebt);
  scrollLossDebt -= loss;
  if (loss > 0) {
    const reason = SCROLL_REASONS[scrollReasonIdx % SCROLL_REASONS.length];
    scrollReasonIdx++;
    updateIQ(-loss, reason);
  }
}

function promoConfirmMessage(purchaseNumber, step, required) {
  const scripts = {
    3: ['Terzo acquisto wellness. Sicuro che la salvezza debba avere un carrello?'],
    4: ['Quarto acquisto. Conferma 1/2: non è autocura se ti serve una ricevuta.', 'Conferma 2/2: stai comprando un limite perché non riesci a metterne uno.'],
    5: ['Quinto acquisto. Il feed apre il reparto casse spirituali.', 'Conferma 2/4: respirare resta gratis, per ora.', 'Conferma 3/4: la tua pace interiore sta chiedendo il CVV.', 'Conferma 4/4: ultimo click prima della monetizzazione dell’anima.']
  };
  return (scripts[purchaseNumber] && scripts[purchaseNumber][step-1]) || `Conferma ${step}/${required}: il capitalismo vuole solo essere sicuro.`;
}

function addNewsCard(forceBrainrot=false) {
  let item, cssClass;
  if (forceBrainrot || brainrotLevel >= 4 || (brainrotLevel >= 2 && Math.random() < 0.22)) {
    [item] = pickItem(NEWS_BRAINROT, brainrotUsed, REPEATABLE_NEWS); cssClass = 'brainrot-news';
  } else {
    const r = Math.random();
    if (r < 0.5) { [item] = pickItem(NEWS_MEH, mehUsed, REPEATABLE_NEWS); cssClass = ''; }
    else if (r < 0.8) { [item] = pickItem(NEWS_INTERESTING, intUsed, REPEATABLE_NEWS); cssClass = 'interesting'; }
    else { [item] = pickItem(NEWS_PEAK, peakUsed, REPEATABLE_NEWS); cssClass = 'peak'; }
  }
  const [hl, tag] = item;
  const src = cssClass === 'brainrot-news' ? 'REDAZIONE SEMANTICAMENTE INSTABILE' : SOURCES[Math.floor(Math.random()*SOURCES.length)];
  const time = TIMES[Math.floor(Math.random()*TIMES.length)];
  const comment = Math.random() < 0.25 ? `<div class="news-comment">${FAKE_COMMENTS[Math.floor(Math.random()*FAKE_COMMENTS.length)]}</div>` : '';
  const div = document.createElement('div');
  div.className = 'news-card ' + cssClass;
  div.innerHTML = `<div class="news-src">${src}</div><div class="news-hl">${hl}</div><div class="news-meta"><span class="news-tag">${tag}</span><span class="news-time">${time}</span></div>${comment}`;
  feed.appendChild(div);
  newsCount++;
  document.getElementById('newsCount').textContent = newsCount;
  cardsSinceInterruption++;
}

function addLercioCard() {
  if (!LERCIO_NEWS || LERCIO_NEWS.length === 0) { addNewsCard(); return; }
  const [item] = pickItem(LERCIO_NEWS, lercioUsed);
  const [hl, tag] = item;
  const src = SOURCES[Math.floor(Math.random()*SOURCES.length)];
  const time = TIMES[Math.floor(Math.random()*TIMES.length)];
  const div = document.createElement('div');
  div.className = 'news-card lercio';
  div.innerHTML = `<div class="news-src">${src}</div><div class="news-hl">${escapeHtml(hl)}</div><div class="news-meta"><span class="news-tag">${escapeHtml(tag)}</span><span class="news-time">${time}</span></div>`;
  feed.appendChild(div);
  newsCount++;
  document.getElementById('newsCount').textContent = newsCount;
  cardsSinceInterruption++;
}


function addAdCard() {
  // Classi DOM senza 'ad': gli ad blocker possono nascondere elementi chiamati ad-card.
  adsShown++;
  loadsSinceAd = 0;
  const [ad] = pickItem(ADS, adUsed);
  const div = document.createElement('div');
  div.className = 'promo-card';
  div.innerHTML = `<div class="promo-label">${ad.label}</div><div class="promo-title">${ad.title}</div><div class="promo-desc">${ad.desc}</div><span class="promo-cta">VEDI SCHEDA PRODOTTO</span>`;
  div.onclick = () => {
    if (div.classList.contains('used') || gameOver) return;
    openProductPage(ad, div);
  };
  feed.appendChild(div);
  cardsSinceInterruption = 0;
}

function escapeHtml(str) {
  return String(str).replace(/[&<>"']/g, ch => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[ch]));
}

function openProductPage(ad, sourceEl) {
  pendingPromo = ad;
  pendingPromoElement = sourceEl;
  purchaseGateStep = 0;
  const nextBuy = adClicks + 1;
  const details = productDetails(ad);
  const required = gateRequirement(nextBuy);
  const assetEmoji = ad.title.includes('Ballerina') ? '☕' :
    ad.title.includes('Smartwatch') ? '⌚' :
    ad.title.includes('Libro') ? '📕' :
    ad.title.includes('Ritiro') ? '🧘' :
    ad.title.includes('Audio') ? '🎧' :
    ad.title.includes('Planner') ? '📒' : '✨';
  const warning = nextBuy >= 3
    ? `<div class="shop-warning-box active">${escapeHtml(SHOP_WARNINGS[nextBuy]?.[0] || SHOP_WARNINGS.default[0])}</div>`
    : '';
  const badges = details.badges.map(b => `<span class="shop-badge">${escapeHtml(b)}</span>`).join('');
  const modal = document.getElementById('shopModal');
  modal.innerHTML = `
    <div class="shop-hero">
      <div class="shop-top">
        <div class="shop-asset" data-asset="${escapeHtml(details.asset.split('/').pop())}">${assetEmoji}</div>
        <div>
          <div class="shop-kicker">scheda prodotto salvata localmente</div>
          <div class="shop-title">${escapeHtml(ad.title)}</div>
          <div class="shop-desc">${escapeHtml(ad.desc)}</div>
          <div class="shop-price-row"><div class="shop-price">${escapeHtml(details.price)}</div><div class="shop-subprice">${escapeHtml(details.subprice)}</div></div>
          <div class="shop-badges">${badges}</div>
        </div>
      </div>
    </div>
    <div class="shop-body">
      <div class="shop-section">
        <div class="shop-section-title">cosa promette</div>
        <p>${escapeHtml(details.promise)}</p>
      </div>
      <div class="shop-section">
        <div class="shop-section-title">cosa fa davvero</div>
        <p>${escapeHtml(details.reality)}</p>
        <div class="shop-review">${escapeHtml(details.review)}</div>
      </div>
      ${warning}
      <div class="shop-gate" id="shopGate"></div>
      <div class="shop-actions">
        <button class="shop-btn close" onclick="closeProductPage()">chiudi scheda</button>
        <button class="shop-btn buy" id="shopBuyBtn" onclick="buyCurrentPromo()">${required ? 'procedi all\'acquisto' : 'compra lucidità'}</button>
      </div>
    </div>`;
  document.getElementById('shopOverlay').classList.add('active');
}

function closeProductPage() {
  document.getElementById('shopOverlay').classList.remove('active');
  pendingPromo = null;
  pendingPromoElement = null;
  purchaseGateStep = 0;
}


function productDetails(ad) {
  const title = ad.title || '';
  const slug = title.toLowerCase().replace(/[^a-z0-9]+/gi,'-').replace(/^-|-$/g,'') || 'prodotto-mentale';

let purchaseGateStep = 0;

function gateRequirement(nextBuy) {
  if (nextBuy === 3) return 1;
  if (nextBuy === 4) return 2;
  if (nextBuy >= 5) return 4;
  return 0;
}

function promoGateMessage(purchaseNumber, step, required) {
  const scripts = {
    3: ['Terzo acquisto wellness. Hint gratuito: forse ascoltare il cervello costa meno del carrello.'],
    4: ['Quarto acquisto. Primo controllo qualità: stai comprando un limite invece di metterlo.', 'Secondo controllo qualità: il cervello offre lo stesso servizio, ma senza fattura.'],
    5: ['Quinto acquisto. Il reparto casse spirituali ti saluta per nome.', 'Respirare resta gratis. Questa informazione non piace agli investitori.', 'Stai per trasformare il problema in abbonamento. È una scelta, tecnicamente.', 'Ultimo click: compri la pace o provi, per scandalo, ad ascoltarti?']
  };
  return (scripts[purchaseNumber] && scripts[purchaseNumber][step-1]) || `Conferma ${step}/${required}: frizione aggiunta per il tuo bene, forse.`;
}

function completePromoPurchase() {
  if (!pendingPromo || !pendingPromoElement || gameOver) return;

}


function buyCurrentPromo() {
  if (!pendingPromo || !pendingPromoElement || gameOver) return;
  const nextBuy = adClicks + 1;
  const required = gateRequirement(nextBuy);
  if (purchaseGateStep < required) {
    purchaseGateStep++;

  completePromoPurchase();

function normalizeQuiz(q) {
  if (q && Array.isArray(q.opts)) return q;
  // Backward compatibility: some older 2-choice polls still exist in the pool.
  // Convert them into the new 4-choice format so one legacy item cannot crash the preview.
  if (q && typeof q.right === 'string' && typeof q.wrong === 'string') {
    return {
      q: q.q || 'Sondaggio non caricato correttamente. Cosa fai?',
      opts: [
        {t: q.right, d: 2, k: 'conscious', fb: q.fb || 'risposta consapevole'},
        {t: 'Non saprei, ma almeno ci penso', d: 0, k: 'neutral', fb: 'neutralità dignitosa'},
        {t: q.wrong, d: -1, k: 'stupid', fb: q.fb || 'scelta discutibile'},
        {t: 'Apro altre 14 notizie per decidere', d: -3, k: 'idiot', fb: 'hai trasformato il dubbio in carburante'}
      ]
    };
  }
  // Last-resort fallback: keep the game alive instead of killing the feed.
  return {
    q: 'Il feed ha perso il sondaggio. Reazione?',
    opts: [
      {t:'Chiudo e salvo la sanità mentale', d:2, k:'conscious', fb:'hai scelto la via improbabile'},
      {t:'Segnalo il bug mentalmente', d:0, k:'neutral', fb:'ticket non aperto'},
      {t:'Continuo come se nulla fosse', d:-1, k:'stupid', fb:'resilienza o negazione'},
      {t:'Clicco tutto più forte', d:-3, k:'idiot', fb:'debugging da primate'}
    ]
  };
}

function addQuizCard() {
  const [rawQuiz] = pickItem(QUIZZES, quizUsed);

  const div = document.createElement('div');

  const opts = [...q.opts].sort(() => Math.random() - 0.5);
  const buttons = opts.map(opt =>
    `<button class="quiz-btn" data-delta="${opt.d}" data-kind="${opt.k}" data-fb="${escapeHtml(opt.fb)}">${escapeHtml(opt.t)}</button>`
  ).join('');

  div.innerHTML = `<div class="quiz-label">▷ Sondaggio onesto / 4 scelte</div><div class="quiz-q">${escapeHtml(q.q)}</div><div class="quiz-options">${buttons}</div><div class="quiz-feedback" style="display:none;"></div>`;
  feed.appendChild(div);

  const btns = div.querySelectorAll('.quiz-btn');
  const fb = div.querySelector('.quiz-feedback');
  btns.forEach(btn => {
    btn.onclick = () => {

      const kind = btn.getAttribute('data-kind');

      fb.style.display = 'block';

      if (delta !== 0) {

          : 'risposta stupida, micro-danno registrato';
        updateIQ(delta, reason);
      } else {
        showToast('0 QI — risposta neutra: non hai peggiorato, non festeggiare', '');

function setBrainrotButton(btn) {
  const n = recentLoadClicks.length;
  let level = 0;

  // Testo che degenera su due assi:
  // - totalLoadMore: quante volte hai caricato in totale (stanchezza)
  // - recentLoadClicks: quanto velocemente stai cliccando (brainrot acuto)
  // Le due scale si sommano — chi clicca in fretta degrada più in fretta.

  // Asse brainrot acuto (click ravvicinati)
  if (n >= 25) level = 4;
  else if (n >= 20) level = 3;
  else if (n >= 15) level = 2;
  else if (n >= 10) level = 1;

  // Asse stanchezza cronica (totalLoadMore) — si accumula più lentamente
  let chronLevel = 0;
  if (totalLoadMore >= 20) chronLevel = 4;
  else if (totalLoadMore >= 14) chronLevel = 3;
  else if (totalLoadMore >= 9) chronLevel = 2;
  else if (totalLoadMore >= 5) chronLevel = 1;

  const effectiveLevel = Math.max(level, chronLevel);
  brainrotLevel = Math.max(brainrotLevel, level);

  // Scala del testo: da verboso e ironico a silenzio totale
  const labels = [
    '↓ carica altro (sì, davvero)',   // 0 — inizio, tono sarcastico
    '↓ un altro po\'',                // 1 — ancora ragionevole
    '↓ ancora',                       // 2 — si semplifica
    '↓ dai',                          // 3 — richiesta
    '↓ pls',                          // 4 — supplica
  ];

  // Livello 4 massimo: testo sparisce, rimane solo la freccia
  const label = effectiveLevel >= 4 ? '↓' : labels[Math.min(effectiveLevel, labels.length - 1)];

  btn.textContent = label;
  btn.className = 'load-more' + (effectiveLevel ? ' glitch-' + Math.min(effectiveLevel, 3) : '');
}

function onLoadMore(btn, event) {
  if (gameOver) return;
  const now = Date.now();
  const fastAgain = lastLoadClickAt && (now - lastLoadClickAt < 650);
  lastLoadClickAt = now;
  if (fastAgain || (event && event.detail >= 2)) {
    doubleClickStreak++;
    brainrotLevel = Math.max(brainrotLevel, Math.min(4, doubleClickStreak));
    showToast('doppio impulso registrato: stabilità semantica in calo', 'bad');
  } else {
    doubleClickStreak = Math.max(0, doubleClickStreak - 1);
  }
  recentLoadClicks.push(now);
  recentLoadClicks = recentLoadClicks.filter(t => now - t < 60000);
  setBrainrotButton(btn);
  if ((recentLoadClicks.length >= 24 && brainrotLevel >= 3) || doubleClickStreak >= 4) { triggerEnding('brainrot'); return; }
  totalLoadMore++;
  loadsSinceAd++;
  spendScrollIQ();
  if (gameOver) return;
  btn.remove();

  try {
    const newsToAdd = 6 + Math.floor(Math.random()*2);
    const mustShowAd = adsShown < 4 || loadsSinceAd >= 2;
    const mustShowQuiz = totalLoadMore <= 3 || (totalLoadMore % 2 === 0);
    // Lercio: più spesso man mano che il QI cala.
    // Sopra 60 è raro (ogni 5 load), sotto 40 è frequente (ogni 2), sotto 20 quasi garantito.
    // Narrativamente: il cervello che degrada smette di distinguere satira da realtà.
    let lercioFreq;
    if (iq >= 60) lercioFreq = 5;
    else if (iq >= 40) lercioFreq = 3;
    else if (iq >= 20) lercioFreq = 2;
    else lercioFreq = 1;
    const showLercio = LERCIO_NEWS.length > 0 && totalLoadMore % lercioFreq === 0;
    const lercioAt = showLercio ? 1 + Math.floor(Math.random()*4) : -1;
    for (let i = 0; i < newsToAdd; i++) {
      if (i === lercioAt) {
        addLercioCard();
      } else {
        addNewsCard(brainrotLevel >= 3 && i === newsToAdd-1);
      }
      if (i === 1 && mustShowQuiz) addQuizCard();
      if (i === 3 && mustShowAd) addAdCard();
    }
  } catch (err) {
    console.error('Errore generazione feed:', err);
    showToast('Il feed ha tossito. Ho salvato il bottone prima che sparisse.', 'bad');
  } finally {
    if (!gameOver) {
      addLoadMore();
      const btns = feed.querySelectorAll('.load-more');
      if (btns.length) setBrainrotButton(btns[btns.length-1]);
    }
  }
}

function buildShareText(type) {
  const t = timeStr(seconds);
  const teasers = {
    nirvana: `QI: 0/100. non è pace, è assenza. la differenza non si sente da dentro. in ${t}. Provalo:`,
    smetti: `ho chiuso l'app. ho annaffiato la pianta. ho ripreso il telefono. punto a capo. (${t}) Provalo:`,
    quit: `QUIT DEFINITIVO in ${t}. ho finito una cosa. ho dormito. ho chiamato qualcuno. pare si possa fare. Provalo:`,
    capitalismo: `ho risolto il doomscrolling comprando 5 prodotti per smettere il doomscrolling. la pace ha un piano annuale. Provalo:`,
    brainrot: `BRAINROT™ in ${t}. sigma. no cap. ratio. il feed ha vinto. fr fr. Provalo:`
  };
  const line = teasers[type] || `DOOM/SCROLL — un feed che vuole il tuo QI. Provalo:`;
  return `${line}\n${window.location.href}`;
}

async function shareEnding(type, btn) {
  const text = buildShareText(type);
  // Web Share API funziona bene su mobile (apre il foglio di condivisione nativo).
  if (navigator.share) {
    try {
      await navigator.share({ title: 'DOOM/SCROLL', text });
      return;
    } catch (err) {
      // L'utente ha annullato. Su molti browser è AbortError: niente fallback, è una scelta consapevole.
      if (err && err.name === 'AbortError') return;
    }
  }
  // Fallback per desktop e browser senza Web Share: copia negli appunti.
  try {
    await navigator.clipboard.writeText(text);
    btn.textContent = 'copiato negli appunti';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = 'condividi'; btn.classList.remove('copied'); }, 2400);
  } catch {
    // Browser molto vecchi: ultimo fallback con textarea.
    const ta = document.createElement('textarea');
    ta.value = text;
    ta.style.position = 'fixed'; ta.style.opacity = '0';
    document.body.appendChild(ta);
    ta.select();
    try { document.execCommand('copy'); btn.textContent = 'copiato'; btn.classList.add('copied'); }
    catch { btn.textContent = 'copia non supportata'; }
    document.body.removeChild(ta);
    setTimeout(() => { btn.textContent = 'condividi'; btn.classList.remove('copied'); }, 2400);
  }
}

function playZenSound() {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    [261.63, 329.63, 392.00].forEach((freq, i) => {
      const o = ctx.createOscillator();
      const g = ctx.createGain();
      o.frequency.value = freq;
      o.type = 'sine';
      o.connect(g); g.connect(ctx.destination);
      g.gain.setValueAtTime(0, ctx.currentTime + i*0.3);
      g.gain.linearRampToValueAtTime(0.15, ctx.currentTime + i*0.3 + 0.05);
      g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + i*0.3 + 3);
      o.start(ctx.currentTime + i*0.3);
      o.stop(ctx.currentTime + i*0.3 + 3);
    });
  } catch(e) {}
}
function playGlitchSound() {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    for (let i = 0; i < 8; i++) {
      const o = ctx.createOscillator();
      const g = ctx.createGain();
      o.frequency.value = 80 + Math.random()*400;
      o.type = 'square';
      o.connect(g); g.connect(ctx.destination);
      g.gain.setValueAtTime(0.08, ctx.currentTime + i*0.08);
      g.gain.linearRampToValueAtTime(0, ctx.currentTime + i*0.08 + 0.05);
      o.start(ctx.currentTime + i*0.08);
      o.stop(ctx.currentTime + i*0.08 + 0.05);
    }
  } catch(e) {}
}

function restartGame() {

  init();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function init() {
  updateFinalsPill();
  // Primo annuncio quasi subito e molto visibile: gli ads sono una meccanica, non decorazione.
  addNewsCard();
  addAdCard();
  for (let i = 0; i < 3; i++) addNewsCard();
  addQuizCard();
  addNewsCard();
  addLoadMore();
  mainTimerId = setInterval(() => {
    if (gameOver) return;
    seconds++;
    document.getElementById('timerVal').textContent = timeStr(seconds);
    if (seconds % 16 === 0) {
      const reason = PASSIVE_REASONS[passiveReasonIdx % PASSIVE_REASONS.length];
      passiveReasonIdx++;
      updateIQ(-1, reason);
    }
    document.getElementById('liveDot').style.opacity = seconds % 2 === 0 ? '1' : '0.3';
  }, 1000);
  scheduleNextBrain('neutral');
}

// Tasto Esc chiude le modal aperte (igiene UX): cervello e shop.
// Non chiude la schermata di finale, che è intenzionalmente bloccante.
document.addEventListener('keydown', (e) => {
  if (e.key !== 'Escape') return;
  const shop = document.getElementById('shopOverlay');
  if (shop && shop.classList.contains('active')) { closeProductPage(); return; }
  const brain = document.getElementById('brainOverlay');
  if (brain && brain.classList.contains('active')) {
    // Chiudere il cervello con Esc = ignorarlo. Coerente con la satira.
    ignoreBrain();
  }
});
