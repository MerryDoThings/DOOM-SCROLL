const feed = document.getElementById('feed');
const STORAGE_KEY = 'doomscroll_finales';

function showToast(msg, kind='') {
  const wrap = document.getElementById('toastWrap');
  const div = document.createElement('div');
  div.className = 'toast ' + kind;
  div.textContent = msg;
  wrap.appendChild(div);
  setTimeout(() => div.remove(), 2900);
}

function pickItem(items, used) {
  if (used.length >= items.length) used.length = 0;
  let idx;
  do { idx = Math.floor(Math.random()*items.length); } while (used.includes(idx));
  used.push(idx);
  return [items[idx], idx];
}
function timeStr(s) { return String(Math.floor(s/60)).padStart(2,'0') + ':' + String(s%60).padStart(2,'0'); }
function getUnlocked() { try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]'); } catch { return []; } }
function unlockFinal(name) {
  const u = getUnlocked();
  if (!u.includes(name)) { u.push(name); localStorage.setItem(STORAGE_KEY, JSON.stringify(u)); }
}

function updateIQDisplay() {
  document.getElementById('iqVal').textContent = iq;
  document.getElementById('progressFill').style.width = iq + '%';
  document.getElementById('progressLbl').textContent = `QI: ${iq}/100`;
  for (const [thr, label] of IQ_STAGES) {
    if (iq >= thr) { document.getElementById('iqStage').textContent = label; break; }
  }
  const iqEl = document.getElementById('iqVal');
  if (iq < 20) iqEl.style.color = '#ff80c0';
  else if (iq < 40) iqEl.style.color = '#ff6060';
  else if (iq < 60) iqEl.style.color = '#ff9040';
  else iqEl.style.color = 'var(--red)';
}
function updateIQ(delta, reason='') {
  if (gameOver) return;
  iq = Math.max(0, Math.min(100, iq + delta));
  if (iq < minIQ) minIQ = iq;
  updateIQDisplay();
  if (reason) showToast((delta > 0 ? '+' : '') + delta + ' QI — ' + reason, delta > 0 ? 'good' : 'bad');
  checkEndings();
}

function addNewsCard(forceBrainrot=false) {
  let item, cssClass;
  if (forceBrainrot || brainrotLevel >= 4 || (brainrotLevel >= 2 && Math.random() < 0.22)) {
    [item] = pickItem(NEWS_BRAINROT, brainrotUsed); cssClass = 'brainrot-news';
  } else {
    const r = Math.random();
    if (r < 0.5) { [item] = pickItem(NEWS_MEH, mehUsed); cssClass = ''; }
    else if (r < 0.8) { [item] = pickItem(NEWS_INTERESTING, intUsed); cssClass = 'interesting'; }
    else { [item] = pickItem(NEWS_PEAK, peakUsed); cssClass = 'peak'; }
  }
  const [hl, tag] = item;
  const src = cssClass === 'brainrot-news' ? 'REDAZIONE SEMANTICAMENTE INSTABILE' : SOURCES[Math.floor(Math.random()*SOURCES.length)];
  const time = TIMES[Math.floor(Math.random()*TIMES.length)];
  const comment = Math.random() < 0.25 ? `<div class="news-comment">${FAKE_COMMENTS[Math.floor(Math.random()*FAKE_COMMENTS.length)]}</div>` : '';
  const div = document.createElement('div');
  div.className = 'news-card ' + cssClass;
  div.innerHTML = `<div class="news-src">${src}</div><div class="news-hl">${hl}</div><div class="news-meta"><span class="news-tag">${tag}</span><span class="news-time">${time}</span></div>${comment}`;
  feed.appendChild(div);
  newsCount++;
  document.getElementById('newsCount').textContent = newsCount;
  cardsSinceInterruption++;
}

function addAdCard() {
  // Classi DOM senza 'ad': gli ad blocker possono nascondere elementi chiamati ad-card.
  adsShown++;
  loadsSinceAd = 0;
  const [ad] = pickItem(ADS, adUsed);
  const div = document.createElement('div');
  div.className = 'promo-card';
  div.innerHTML = `<div class="promo-label">${ad.label}</div><div class="promo-title">${ad.title}</div><div class="promo-desc">${ad.desc}</div><span class="promo-cta">${ad.cta}</span>`;

    if (div.classList.contains('used') || gameOver) return;
    div.classList.add('used');
    adClicks++;
    usefulAdClicks++;
    spiritualDebt += ad.iq >= 8 ? 2 : 1;
    div.querySelector('.promo-cta').textContent = 'ACQUISTATO MENTALMENTE';
    const result = document.createElement('div');
    result.className = 'promo-result';
    result.textContent = ad.result;
    div.appendChild(result);
    updateIQ(ad.iq, 'lucidità con ricevuta fiscale');
    if (!gameOver && adClicks >= 5 && iq >= 35) {
      setTimeout(() => triggerEnding('capitalismo'), 650);
    } else if (!gameOver && adClicks >= 5 && iq < 35) {
      showToast('Troppo tardi per il capitalismo spirituale. Sei già quasi folklore.', 'bad');
    }
  };
  feed.appendChild(div);
  cardsSinceInterruption = 0;
}

function addQuizCard() {
  const [q] = pickItem(QUIZZES, quizUsed);
  const div = document.createElement('div');
  div.className = 'quiz-card';
  const wrongFirst = Math.random() < 0.5;
  const opt1 = wrongFirst ? q.wrong : q.right;
  const opt2 = wrongFirst ? q.right : q.wrong;
  div.innerHTML = `<div class="quiz-label">▷ Sondaggio onesto</div><div class="quiz-q">${q.q}</div><div class="quiz-options"><button class="quiz-btn" data-correct="${!wrongFirst}">${opt1}</button><button class="quiz-btn" data-correct="${wrongFirst}">${opt2}</button></div><div class="quiz-feedback" style="display:none;"></div>`;
  feed.appendChild(div);
  const btns = div.querySelectorAll('.quiz-btn');
  const fb = div.querySelector('.quiz-feedback');
  btns.forEach(btn => {
    btn.onclick = () => {
      const correct = btn.getAttribute('data-correct') === 'true';
      btns.forEach(b => { b.disabled = true; });
      if (correct) {
        btn.classList.add('answered-right');
        fb.textContent = "// risposta consapevole — +2 QI";
        updateIQ(2, 'risposta consapevole, raro evento naturale');
      } else {
        btn.classList.add('answered-wrong');
        fb.textContent = "// " + q.fb + " — -1 QI";
        updateIQ(-1, 'risposta impulsiva, danno lieve ma registrato');
      }
      fb.style.display = 'block';
    };
  });
  cardsSinceInterruption = 0;
}

function addLoadMore() {
  const btn = document.createElement('button');
  btn.className = 'load-more';
  btn.textContent = '↓ carica altro (sì, davvero)';
  btn.onclick = (event) => onLoadMore(btn, event);
  setTimeout(() => setBrainrotButton(btn), 0);
  feed.appendChild(btn);
}

function setBrainrotButton(btn) {
  const n = recentLoadClicks.length;
  let level = 0, label = '↓ carica altro (sì, davvero)';
  if (n >= 25) { level = 4; label = '↓ TUNG TUNG TUNG'; }
  else if (n >= 20) { level = 3; label = '↓ tung?'; }
  else if (n >= 15) { level = 2; label = '↓ ANCORA'; }
  else if (n >= 10) { level = 1; label = '↓ ancora uno'; }
  brainrotLevel = Math.max(brainrotLevel, level);
  btn.textContent = label;
  btn.className = 'load-more' + (level ? ' glitch-' + Math.min(level,3) : '');
}

function onLoadMore(btn, event) {
  if (gameOver) return;
  const now = Date.now();
  // Brainrot più intuitivo: clic ravvicinati/doppio click sul pulsante accelerano il collasso.
  const fastAgain = lastLoadClickAt && (now - lastLoadClickAt < 650);
  lastLoadClickAt = now;
  if (fastAgain || (event && event.detail >= 2)) {
    doubleClickStreak++;
    brainrotLevel = Math.max(brainrotLevel, Math.min(4, doubleClickStreak));
    showToast('doppio impulso registrato: stabilità semantica in calo', 'bad');
  } else {
    doubleClickStreak = Math.max(0, doubleClickStreak - 1);
  }
  recentLoadClicks.push(now);
  recentLoadClicks = recentLoadClicks.filter(t => now - t < 60000);
  setBrainrotButton(btn);
  if ((recentLoadClicks.length >= 24 && brainrotLevel >= 3) || doubleClickStreak >= 4) { triggerEnding('brainrot'); return; }
  totalLoadMore++;
  loadsSinceAd++;
  updateIQ(-1, 'scroll intenzionale, quasi impercettibile');
  if (gameOver) return;
  btn.remove();

  const newsToAdd = 6 + Math.floor(Math.random()*2);
  // Ads deterministici: nei primi caricamenti non possono sparire nel caso.
  // Poi tornano almeno ogni 2 caricamenti, altrimenti Quit/Capitalismo non sono giocabili.
  const mustShowAd = adsShown < 4 || loadsSinceAd >= 2;
  const mustShowQuiz = totalLoadMore <= 3 || (totalLoadMore % 2 === 0);
  for (let i = 0; i < newsToAdd; i++) {
    addNewsCard(brainrotLevel >= 3 && i === newsToAdd-1);
    if (i === 1 && mustShowQuiz) addQuizCard();
    if (i === 3 && mustShowAd) addAdCard();
  }
  addLoadMore();
  const btns = feed.querySelectorAll('.load-more');
  if (btns.length) setBrainrotButton(btns[btns.length-1]);
}

function showBrainPopup() {
  if (gameOver) return;
  let idx = brainListened + brainIgnored;
  if (idx >= BRAIN_MSGS.length) idx = BRAIN_MSGS.length - 1;
  document.getElementById('brainMsg').textContent = BRAIN_MSGS[idx];
  document.getElementById('brainOverlay').classList.add('active');
}

function listenBrain() {
  document.getElementById('brainOverlay').classList.remove('active');
  brainListened++;
  brainListenedStreak++;
  showToast(`cervello ascoltato: ${Math.min(brainListenedStreak,3)}/3`, 'good');
  if (brainListenedStreak >= 3) {
    if (usefulAdClicks >= 2 && adClicks < 5) triggerEnding('quit');
    else triggerEnding('smetti');
    return;
  }
  scheduleNextBrain('listen');
}

function ignoreBrain() {
  document.getElementById('brainOverlay').classList.remove('active');
  brainIgnored++;
  everIgnored = true;
  brainListenedStreak = 0;
  updateIQ(-3, 'il cervello prende nota del tradimento');
  scheduleNextBrain('ignore');
}

function scheduleNextBrain(mode='neutral') {
  // Il finale buono deve essere giocabile: se ascolti il cervello, torna presto.
  // Se lo ignori, invece diventa più raro e più cinico.
  let delay;
  if (mode === 'listen') delay = Math.min(45000, 22000 + brainListened * 6000);
  else if (mode === 'ignore') delay = Math.min(180000, 85000 + brainIgnored * 30000);
  else delay = 25000;
  if (brainTimerId) clearTimeout(brainTimerId);
  brainTimerId = setTimeout(() => { if (!gameOver) showBrainPopup(); }, delay);
}

function checkEndings() {
  if (gameOver) return;
  if (iq <= 0) triggerEnding('nirvana');
}

    html = `<h1>BRAINROT™</h1><p>Hai cliccato troppo velocemente.</p><p>Il feed non riesce più a produrre significato. Ora produce solo stimoli.</p><p style="margin-top:16px;">uomo fa cosa<br>esperto dice boh<br>internet arrabbiato<br>guarda questo<br>ancora<br>ANCORA</p><p style="margin-top:20px;font-size:22px;line-height:1.6;">TUNG TUNG TUNG SAHUR<br>TRALALERO TRALALÀ<br>BRR BRR PATAPIM<br>BALLERINA CAPPUCCINA<br>BOMBARDIRO CROCODILO</p><p style="margin-top:20px;">Il tuo cervello non legge più. Riconosce solo pattern.</p><p>La frase lunga è morta. Viva il suono.</p><p style="margin-top:16px;font-size:24px;">💀</p>${stats}`;
    overlay.innerHTML = html;
    playGlitchSound();
  }
}

function playZenSound() {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    [261.63, 329.63, 392.00].forEach((freq, i) => {
      const o = ctx.createOscillator();
      const g = ctx.createGain();
      o.frequency.value = freq;
      o.type = 'sine';
      o.connect(g); g.connect(ctx.destination);
      g.gain.setValueAtTime(0, ctx.currentTime + i*0.3);
      g.gain.linearRampToValueAtTime(0.15, ctx.currentTime + i*0.3 + 0.05);
      g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + i*0.3 + 3);
      o.start(ctx.currentTime + i*0.3);
      o.stop(ctx.currentTime + i*0.3 + 3);
    });
  } catch(e) {}
}
function playGlitchSound() {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    for (let i = 0; i < 8; i++) {
      const o = ctx.createOscillator();
      const g = ctx.createGain();
      o.frequency.value = 80 + Math.random()*400;
      o.type = 'square';
      o.connect(g); g.connect(ctx.destination);
      g.gain.setValueAtTime(0.08, ctx.currentTime + i*0.08);
      g.gain.linearRampToValueAtTime(0, ctx.currentTime + i*0.08 + 0.05);
      o.start(ctx.currentTime + i*0.08);
      o.stop(ctx.currentTime + i*0.08 + 0.05);
    }
  } catch(e) {}
}
function spawnEmojis() {
  const emojis = ['🌸','🧘','✨','🌼','🕉️','🪷','💆','☮️','🌿'];
  const container = document.getElementById('floatingEmojis');
  for (let i = 0; i < 25; i++) {
    const span = document.createElement('span');
    span.textContent = emojis[Math.floor(Math.random()*emojis.length)];
    span.style.left = Math.random()*100 + '%';
    span.style.animationDuration = (4 + Math.random()*5) + 's';
    span.style.animationDelay = (Math.random()*3) + 's';
    span.style.fontSize = (24 + Math.random()*32) + 'px';
    container.appendChild(span);
  }
}

function resetStateForNewRun() {
  iq = 100; minIQ = 100; seconds = 0; newsCount = 0;
  brainListened = 0; brainListenedStreak = 0; brainIgnored = 0; everIgnored = false;
  cardsSinceInterruption = 0; recentLoadClicks = []; gameOver = false; totalLoadMore = 0;
  adClicks = 0; usefulAdClicks = 0; spiritualDebt = 0; adsShown = 0; loadsSinceAd = 0; brainrotLevel = 0; doubleClickStreak = 0; lastLoadClickAt = 0; interruptionCount = 0;
  mehUsed = []; intUsed = []; peakUsed = []; adUsed = []; quizUsed = []; brainrotUsed = [];
  feed.innerHTML = '';
  document.getElementById('endingOverlay').className = 'ending-overlay';
  document.getElementById('endingOverlay').innerHTML = '';
  document.getElementById('brainOverlay').classList.remove('active');
  document.getElementById('timerVal').textContent = '00:00';
  document.getElementById('newsCount').textContent = '0';
  updateIQDisplay();
}

function restartGame() {
  if (mainTimerId) clearInterval(mainTimerId);
  if (brainTimerId) clearTimeout(brainTimerId);
  resetStateForNewRun();
  init();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function init() {
  // Primo annuncio quasi subito e molto visibile: gli ads sono una meccanica, non decorazione.
  addNewsCard();
  addAdCard();
  for (let i = 0; i < 3; i++) addNewsCard();
  addQuizCard();
  addNewsCard();
  addLoadMore();
  mainTimerId = setInterval(() => {
    if (gameOver) return;
    seconds++;
    document.getElementById('timerVal').textContent = timeStr(seconds);
    if (seconds % 24 === 0) updateIQ(-1, 'esposizione passiva al nulla, goccia dopo goccia');
    document.getElementById('liveDot').style.opacity = seconds % 2 === 0 ? '1' : '0.3';
  }, 1000);
  scheduleNextBrain('neutral');
}
init();
