<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DOOM/SCROLL v2.6</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0d0d0d; --bg-card: #111; --border: #222; --border-hover: #333;
    --text: #e8e8e8; --text-dim: #888; --text-muted: #555; --text-faint: #3a3a3a;
    --red: #e03535; --red-bg: #1a0a0a; --green: #4ca84a; --green-bg: #0a1a0a;
  }
  body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; min-height: 100vh; overflow-x: hidden; }
  #app { max-width: 480px; margin: 0 auto; padding: 0 12px 80px; }
  .header { position: sticky; top: 0; background: var(--bg); border-bottom: 1px solid var(--border); padding: 12px 0 10px; z-index: 50; }
  .app-title { display: flex; align-items: center; gap: 8px; font-size: 11px; letter-spacing: 0.18em; color: var(--text-muted); font-weight: 600; margin-bottom: 10px; font-family: 'Courier New', monospace; }
  .brand { color: var(--text-dim); letter-spacing: 0.22em; }
  .live-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--red); flex-shrink: 0; }
  .iq-stage { margin-left: auto; font-size: 9px; color: var(--text-faint); letter-spacing: 0.05em; text-transform: lowercase; }
  .stats-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; }
  .stat { background: #161616; border: 1px solid #252525; border-radius: 8px; padding: 8px 10px; text-align: center; }
  .stat-val { font-size: 20px; font-weight: 600; color: var(--red); font-family: 'Courier New', monospace; line-height: 1; transition: color 0.4s; }
  .stat-lbl { font-size: 9px; color: var(--text-muted); margin-top: 4px; text-transform: uppercase; letter-spacing: 0.06em; }
  .progress-bar { height: 2px; background: #1e1e1e; margin-top: 10px; border-radius: 1px; overflow: hidden; }
  .progress-fill { height: 100%; background: var(--red); width: 100%; transition: width 0.6s ease; }
  .progress-lbl { font-size: 9px; color: var(--text-faint); margin-top: 4px; font-family: 'Courier New', monospace; text-align: right; letter-spacing: 0.04em; }
  .feed { padding: 14px 0; }
  .news-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 10px; padding: 14px; margin-bottom: 10px; transition: border-color 0.2s; animation: fadeUp 0.3s ease; }
  .news-card:hover { border-color: var(--border-hover); }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
  .news-src { font-size: 9px; color: var(--text-muted); margin-bottom: 5px; font-family: 'Courier New', monospace; text-transform: uppercase; letter-spacing: 0.08em; }
  .news-hl { font-size: 14px; font-weight: 500; color: #d8d8d8; line-height: 1.45; margin-bottom: 10px; }
  .news-meta { display: flex; align-items: center; gap: 8px; }
  .news-tag { font-size: 9px; padding: 3px 7px; border-radius: 4px; background: #1a1a1a; color: var(--text-muted); border: 1px solid #252525; text-transform: uppercase; letter-spacing: 0.05em; }
  .news-time { font-size: 11px; color: var(--text-faint); margin-left: auto; font-family: 'Courier New', monospace; }
  .news-card.peak { border-left: 2px solid var(--red); }
  .news-card.peak .news-hl { color: #f0c8c8; font-style: italic; }
  .news-card.interesting .news-tag { background: #131c13; color: #6fa66f; border-color: #1c2c1c; }
  .promo-card { background: linear-gradient(135deg, #21180b 0%, #1a1a1a 58%, #17100c 100%); border: 1px dashed #b9822d; border-radius: 10px; padding: 14px; margin-bottom: 10px; cursor: pointer; transition: all 0.2s; animation: fadeUp 0.3s ease; box-shadow: 0 0 0 1px rgba(185,130,45,.12); }
  .promo-card::before { content: 'SPONSOR WELLNESS / TRAPPOLA DI LUCIDITÀ'; display: block; font-size: 8px; color: #d8bd77; letter-spacing: .16em; font-family: 'Courier New', monospace; margin-bottom: 7px; opacity: .9; }
  .promo-card:hover { border-color: #666; }
  .promo-label { font-size: 8px; color: #c8a045; text-transform: uppercase; letter-spacing: 0.15em; margin-bottom: 5px; font-family: 'Courier New', monospace; }
  .promo-title { font-size: 14px; font-weight: 600; color: #e8d8b8; margin-bottom: 4px; }
  .promo-desc { font-size: 12px; color: #aa9070; margin-bottom: 8px; line-height: 1.4; }
  .promo-cta { display: inline-block; font-size: 11px; padding: 5px 12px; background: #2a2015; color: #c8a045; border-radius: 4px; border: 1px solid #443015; font-weight: 500; text-transform: uppercase; letter-spacing: 0.05em; }
  .quiz-card { background: var(--bg-card); border: 1px solid #2a3a2a; border-left: 2px solid #5a8a5a; border-radius: 10px; padding: 14px; margin-bottom: 10px; animation: fadeUp 0.3s ease; }
  .quiz-label { font-size: 9px; color: #6fa66f; margin-bottom: 6px; font-family: 'Courier New', monospace; text-transform: uppercase; letter-spacing: 0.08em; }
  .quiz-q { font-size: 14px; color: #d8d8d8; line-height: 1.45; margin-bottom: 12px; }
  .quiz-options { display: flex; flex-direction: column; gap: 6px; }
  .quiz-btn { background: #161616; border: 1px solid #2a2a2a; color: #b8b8b8; padding: 9px 12px; border-radius: 6px; text-align: left; cursor: pointer; font-size: 12px; font-family: inherit; transition: all 0.15s; }
  .quiz-btn:hover { background: #1c1c1c; border-color: #3a3a3a; color: #d8d8d8; }
  .quiz-btn.answered-wrong { border-color: var(--red); background: var(--red-bg); color: #c8c8c8; cursor: default; }
  .quiz-btn.answered-right { border-color: var(--green); background: var(--green-bg); color: #c8c8c8; cursor: default; }
  .quiz-btn:disabled { opacity: 0.4; cursor: default; }
  .quiz-feedback { font-size: 11px; color: var(--text-muted); font-family: 'Courier New', monospace; margin-top: 8px; font-style: italic; }
  .load-more { width: 100%; padding: 13px; background: var(--bg-card); border: 1px solid #252525; border-radius: 8px; color: var(--text-muted); font-size: 12px; cursor: pointer; margin-top: 4px; font-family: 'Courier New', monospace; letter-spacing: 0.04em; transition: border-color 0.2s, color 0.2s; }
  .load-more:hover { border-color: var(--red); color: var(--text-dim); }
  .load-more.glitch-1 { animation: glitch1 0.3s; }
  .load-more.glitch-2 { animation: glitch2 0.3s; }
  .load-more.glitch-3 { animation: glitch3 0.3s; color: #ff4040 !important; border-color: var(--red) !important; }
  @keyframes glitch1 { 0%,100% { transform: translateX(0); } 50% { transform: translateX(-1px); } }
  @keyframes glitch2 { 0%,100% { transform: translateX(0); } 25% { transform: translateX(2px); } 75% { transform: translateX(-2px); } }
  @keyframes glitch3 { 0%,100% { transform: translateX(0); text-shadow: none; } 33% { transform: translateX(-3px); text-shadow: 2px 0 var(--red); } 66% { transform: translateX(3px); text-shadow: -2px 0 #4040ff; } }
  .brain-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); display: none; align-items: center; justify-content: center; z-index: 100; padding: 20px; animation: fadeIn 0.4s ease; }
  .brain-overlay.active { display: flex; }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  .brain-modal { background: var(--bg); border: 1px solid var(--text-dim); border-radius: 12px; padding: 24px; max-width: 420px; width: 100%; animation: scaleIn 0.3s ease; }
  @keyframes scaleIn { from { transform: scale(0.95); opacity: 0; } to { transform: scale(1); opacity: 1; } }
  .brain-label { font-size: 10px; color: var(--text-dim); font-family: 'Courier New', monospace; text-transform: uppercase; letter-spacing: 0.15em; margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
  .brain-label::before { content: '◉'; color: var(--text-dim); animation: pulse 1.5s infinite; }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }
  .brain-msg { font-size: 16px; color: var(--text); font-family: 'Courier New', monospace; line-height: 1.6; margin-bottom: 20px; min-height: 60px; }
  .brain-actions { display: flex; gap: 8px; }
  .brain-btn { flex: 1; padding: 11px; border-radius: 8px; border: 1px solid; background: transparent; cursor: pointer; font-size: 12px; font-family: 'Courier New', monospace; text-transform: uppercase; letter-spacing: 0.05em; transition: all 0.2s; }
  .brain-btn.listen { border-color: var(--green); color: var(--green); }
  .brain-btn.listen:hover { background: var(--green-bg); }
  .brain-btn.ignore { border-color: var(--text-faint); color: var(--text-muted); }
  .brain-btn.ignore:hover { background: var(--red-bg); border-color: var(--red); color: var(--red); }
  .ending-overlay { position: fixed; inset: 0; display: none; align-items: center; justify-content: center; z-index: 200; padding: 20px; overflow-y: auto; }
  .ending-overlay.active { display: flex; }
  .ending-overlay.nirvana { background: #fefcf5; color: #555; text-align: center; flex-direction: column; animation: fadeIn 1.5s ease; }
  .ending-overlay.nirvana .ending-emoji { font-size: 72px; margin-bottom: 16px; animation: bounce 2s infinite; }
  @keyframes bounce { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-12px); } }
  .ending-overlay.nirvana h1 { font-family: 'Times New Roman', serif; font-size: 28px; color: #b8a060; font-weight: normal; margin-bottom: 8px; letter-spacing: 0.1em; }
  .ending-overlay.nirvana p { font-family: 'Times New Roman', serif; font-size: 16px; line-height: 1.7; max-width: 380px; margin: 8px auto; color: #807060; font-style: italic; }
  .floating-emojis { position: absolute; inset: 0; pointer-events: none; overflow: hidden; }
  .floating-emojis span { position: absolute; font-size: 32px; animation: float linear infinite; }
  @keyframes float { from { transform: translateY(110vh); } to { transform: translateY(-20vh); } }
  .ending-overlay.smetti { background: #1a1a1a; color: #c8c8c8; text-align: center; flex-direction: column; }
  .ending-overlay.smetti h1 { font-size: 22px; font-weight: 500; margin-bottom: 16px; color: #e8e8e8; }
  .ending-overlay.smetti p { font-size: 14px; line-height: 1.7; max-width: 380px; margin: 6px auto; color: #a8a8a8; }
  .ending-overlay.cervello { background: #f5f3ee; color: #2a2a28; text-align: center; flex-direction: column; }
  .ending-overlay.cervello h1 { font-family: 'Times New Roman', serif; font-size: 26px; font-weight: normal; margin-bottom: 16px; letter-spacing: 0.05em; color: #1a1a18; }
  .ending-overlay.cervello p { font-family: 'Times New Roman', serif; font-size: 15px; line-height: 1.8; max-width: 380px; margin: 6px auto; color: #4a4a48; }
  .ending-overlay.brainrot { background: #000; color: #f0f0f0; text-align: center; flex-direction: column; }
  .ending-overlay.brainrot h1 { font-size: 36px; font-family: 'Courier New', monospace; color: #ff3030; margin-bottom: 16px; text-shadow: 3px 0 #00ffff, -3px 0 #ff00ff; animation: glitch3 0.5s infinite; }
  .ending-overlay.brainrot p { font-size: 15px; font-family: 'Courier New', monospace; line-height: 1.5; max-width: 360px; margin: 4px auto; color: #d0d0d0; }
  .ending-stats { margin: 24px auto 12px; padding: 12px; border-top: 1px solid currentColor; border-bottom: 1px solid currentColor; opacity: 0.6; max-width: 320px; font-size: 12px; font-family: 'Courier New', monospace; }
  .ending-stats div { display: flex; justify-content: space-between; padding: 2px 0; }
  .ending-progress { margin-top: 20px; font-size: 11px; font-family: 'Courier New', monospace; letter-spacing: 0.1em; opacity: 0.7; }
  .ending-finals { font-size: 10px; margin-top: 6px; font-family: 'Courier New', monospace; letter-spacing: 0.05em; opacity: 0.5; line-height: 1.6; }
  .ending-restart { margin-top: 24px; padding: 12px 28px; background: transparent; border: 1px solid currentColor; color: currentColor; cursor: pointer; font-size: 12px; font-family: 'Courier New', monospace; text-transform: uppercase; letter-spacing: 0.15em; border-radius: 6px; transition: opacity 0.2s; }
  .ending-restart:hover { opacity: 0.7; }

  .news-comment { margin-top: 9px; padding-top: 8px; border-top: 1px solid #1e1e1e; font-size: 11px; color: #707070; line-height: 1.35; font-family: 'Courier New', monospace; }
  .news-card.brainrot-news { border-color: #ff3030; box-shadow: 0 0 0 1px rgba(255,48,48,.15); animation: fadeUp 0.3s ease, glitch2 1.2s infinite; }
  .news-card.brainrot-news .news-hl { color: #ffd0d0; font-family: 'Courier New', monospace; }
  .promo-card.used { opacity: 0.72; border-style: solid; cursor: default; }
  .promo-result { margin-top: 9px; padding-top: 8px; border-top: 1px dashed #4a3a22; font-size: 11px; color: #d8bd77; line-height: 1.4; font-family: 'Courier New', monospace; }
  .toast-wrap { position: fixed; left: 50%; bottom: 18px; transform: translateX(-50%); z-index: 300; width: min(440px, calc(100vw - 24px)); pointer-events: none; }
  .toast { background: rgba(12,12,12,.94); border: 1px solid #333; color: #d8d8d8; border-radius: 8px; padding: 10px 12px; margin-top: 8px; font-size: 12px; font-family: 'Courier New', monospace; box-shadow: 0 8px 28px rgba(0,0,0,.35); animation: toastIn .18s ease, toastOut .35s ease 2.4s forwards; }
  .toast.good { border-color: #315a31; color: #a9d6a9; }
  .toast.bad { border-color: #5a3131; color: #e0a0a0; }
  @keyframes toastIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes toastOut { to { opacity: 0; transform: translateY(8px); } }

  .shop-overlay { position: fixed; inset: 0; display: none; align-items: center; justify-content: center; z-index: 180; padding: 18px; background: rgba(0,0,0,.88); animation: fadeIn .18s ease; }
  .shop-overlay.active { display: flex; }
  .shop-modal { width: min(440px, 100%); background: #12100d; border: 1px solid #b9822d; border-radius: 14px; padding: 18px; box-shadow: 0 18px 80px rgba(0,0,0,.65), 0 0 0 1px rgba(185,130,45,.15); }
  .shop-top { display: flex; gap: 14px; align-items: stretch; margin-bottom: 14px; }
  .shop-asset { width: 92px; min-width: 92px; border-radius: 12px; border: 1px solid #4a351d; background: radial-gradient(circle at 35% 25%, #443016, #18120d 70%); display: flex; align-items: center; justify-content: center; font-size: 42px; position: relative; overflow: hidden; }
  .shop-asset::after { content: 'ASSET'; position: absolute; bottom: 6px; right: 7px; font-size: 8px; letter-spacing: .15em; color: #c8a045; opacity: .65; font-family: 'Courier New', monospace; }
  .shop-kicker { font-size: 9px; color: #c8a045; text-transform: uppercase; letter-spacing: .16em; font-family: 'Courier New', monospace; margin-bottom: 6px; }
  .shop-title { font-size: 18px; color: #f0dfba; font-weight: 650; line-height: 1.2; margin-bottom: 6px; }
  .shop-desc { font-size: 13px; color: #b9a27c; line-height: 1.45; }
  .shop-meta { border-top: 1px dashed #4a351d; border-bottom: 1px dashed #4a351d; padding: 10px 0; margin: 12px 0; font-size: 11px; color: #d8bd77; font-family: 'Courier New', monospace; line-height: 1.6; }
  .shop-hint { display: none; background: #1d130f; border: 1px solid #693a2a; color: #e0a28d; border-radius: 8px; padding: 9px 10px; font-size: 12px; line-height: 1.35; margin: 10px 0; font-family: 'Courier New', monospace; }
  .shop-actions { display: flex; gap: 8px; margin-top: 14px; }
  .shop-btn { flex: 1; padding: 11px; border-radius: 8px; border: 1px solid; background: transparent; cursor: pointer; font-size: 12px; font-family: 'Courier New', monospace; text-transform: uppercase; letter-spacing: .08em; }
  .shop-btn.buy { color: #d8bd77; border-color: #8f6725; background: #201608; }
  .shop-btn.buy:hover { background: #2a1d0b; }
  .shop-btn.close { color: #888; border-color: #333; }
  .shop-btn.close:hover { color: #ccc; border-color: #555; }
  .quiz-btn.answered-neutral { border-color: #555; background: #181818; color: #c8c8c8; cursor: default; }
  .quiz-btn.answered-idiot { border-color: #ff3030; background: #230707; color: #ffb0b0; cursor: default; }



  /* v2.9 — product page instead of info list */
  .shop-modal { width: min(460px, 100%); padding: 0; overflow: hidden; background: #120f0b; }
  .shop-hero { padding: 16px; background: radial-gradient(circle at 20% 0%, rgba(216,189,119,.14), transparent 38%), linear-gradient(135deg, #1d1409, #12100d 62%); border-bottom: 1px solid #4a351d; }
  .shop-top { margin-bottom: 0; align-items: center; }
  .shop-asset { width: 112px; min-width: 112px; height: 112px; font-size: 48px; background: radial-gradient(circle at 36% 24%, #5a3f1b, #1b130c 72%); box-shadow: inset 0 0 24px rgba(216,189,119,.08); }
  .shop-asset::after { content: attr(data-asset); left: 8px; right: 8px; bottom: 7px; text-align: center; font-size: 7px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .shop-kicker { color: #d8bd77; }
  .shop-title { font-size: 20px; color: #f4e5c6; }
  .shop-desc { color: #c7ad82; }
  .shop-price-row { display:flex; align-items:flex-end; gap:8px; margin-top:10px; }
  .shop-price { font-size: 22px; color:#f0dfba; font-weight:700; font-family:'Courier New', monospace; }
  .shop-subprice { font-size:10px; color:#8d7654; margin-bottom:3px; text-transform:uppercase; letter-spacing:.08em; }
  .shop-badges { display:flex; flex-wrap:wrap; gap:6px; margin-top:10px; }
  .shop-badge { font-size:9px; color:#d8bd77; border:1px solid #59401e; background:#211608; border-radius:999px; padding:4px 7px; font-family:'Courier New', monospace; letter-spacing:.04em; }
  .shop-body { padding: 14px 16px 16px; }
  .shop-section { border: 1px solid #2f2416; border-radius: 10px; padding: 10px 11px; margin-bottom: 9px; background:#15110c; }
  .shop-section-title { font-size:9px; color:#9f7d3a; text-transform:uppercase; letter-spacing:.16em; font-family:'Courier New', monospace; margin-bottom:6px; }
  .shop-section p { font-size:12px; line-height:1.45; color:#c4ad89; margin:0; }
  .shop-review { font-size:11px; color:#8e7b60; line-height:1.4; font-style:italic; margin-top:8px; }
  .shop-warning-box { display:none; border:1px solid #693a2a; background:#1d130f; color:#e0a28d; border-radius:10px; padding:10px 11px; font-size:12px; line-height:1.4; margin-bottom:10px; font-family:'Courier New', monospace; }
  .shop-warning-box.active { display:block; }
  .shop-gate { display:none; border:1px solid #8a4a2d; background:#23120b; color:#f0b494; border-radius:10px; padding:10px 11px; font-size:12px; line-height:1.4; margin-bottom:10px; font-family:'Courier New', monospace; animation: fadeUp .16s ease; }
  .shop-gate.active { display:block; }
  .shop-actions { padding: 0; margin-top: 12px; }
  .shop-btn.buy { background:#261907; color:#f3d58e; }
  .shop-btn.buy.armed { border-color:#bd613e; color:#ffb092; background:#31150d; animation: glitch1 .3s; }

</style>
</head>
<body>
<div id="app">
  <div class="header">
    <div class="app-title">
      <span class="live-dot" id="liveDot"></span>
      <span class="brand">DOOM/SCROLL</span>
      <span class="iq-stage" id="iqStage">cosciente</span>
    </div>
    <div class="stats-row">
      <div class="stat"><div class="stat-val" id="iqVal">100</div><div class="stat-lbl">QI residuo</div></div>
      <div class="stat"><div class="stat-val" id="timerVal">00:00</div><div class="stat-lbl">Tempo perso</div></div>
      <div class="stat"><div class="stat-val" id="newsCount">0</div><div class="stat-lbl">Cose viste</div></div>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
    <div class="progress-lbl" id="progressLbl">QI: 100/100</div>
  </div>
  <div class="feed" id="feed"></div>
</div>

<div class="brain-overlay" id="brainOverlay">
  <div class="brain-modal">
    <div class="brain-label">messaggio dal cervello</div>
    <div class="brain-msg" id="brainMsg"></div>
    <div class="brain-actions">
      <button class="brain-btn listen" onclick="listenBrain()">ok smetto</button>
      <button class="brain-btn ignore" onclick="ignoreBrain()">tra un po'</button>
    </div>
  </div>
</div>

<div class="ending-overlay" id="endingOverlay"></div>
<div class="shop-overlay" id="shopOverlay">
  <div class="shop-modal" id="shopModal"></div>
</div>
<div class="toast-wrap" id="toastWrap"></div>

<script>
const NEWS_MEH = [
  ["Scienziati confermano: tutto sta peggiorando, ma gradualmente","Scienza"],
  ["Studio: controllare le notizie ogni 5 minuti non aiuta","Salute"],
  ["Nuovo record di caldo. Terzo consecutivo. Nessuno sorpreso","Clima"],
  ["Governo annuncia soluzione, poi ci ripensa","Politica"],
  ["Esperto: 'La situazione è seria'. Nessuno fa nulla","Economia"],
  ["Sì, anche questo è probabilmente colpa del cambiamento climatico","Ambiente"],
  ["Miliardario lancia iniziativa filantropica. Non risolve nulla","Business"],
  ["Nuova crisi nelle ultime 24 ore. Come ogni giorno dal 2016","Mondo"],
  ["Algoritmo ottimizzato per tenerti qui più a lungo. Funziona","Tech"],
  ["Inflazione, guerra, clima, pandemia. E tu come stai?","Generale"],
  ["Annunciato nuovo piano per il futuro. Il futuro non commenta","Politica"],
  ["Borsa in calo. Domani in rialzo. Dopodomani non si sa","Economia"],
  ["Politico fa promessa elettorale. Mai sentita prima","Politica"],
  ["Nuovo studio contraddice quello precedente di tre mesi fa","Scienza"],
  ["Allarme rosso revocato. Allarme arancione confermato","Cronaca"],
  ["Banca centrale alza i tassi. La tua casa costa uguale","Economia"],

    const fb = fallbackItems && fallbackItems.length ? fallbackItems[Math.floor(Math.random()*fallbackItems.length)] : ["Feed esaurito. Persino l'algoritmo ha finito le scuse.", "Déjà-vu"];
    return [fb, -1];
  }
  if (used.length >= items.length) {
    const fb = fallbackItems && fallbackItems.length ? fallbackItems[Math.floor(Math.random()*fallbackItems.length)] : ["Hai letto tutto. Il feed adesso si ripete e fa finta sia nostalgia.", "Déjà-vu"];
    return [fb, -1];
  }
  let idx;
  let guard = 0;
  do { idx = Math.floor(Math.random()*items.length); guard++; } while (used.includes(idx) && guard < 1000);
  if (used.includes(idx)) {
    const fb = fallbackItems && fallbackItems.length ? fallbackItems[Math.floor(Math.random()*fallbackItems.length)] : ["Ripetizione di emergenza: il contenuto è finito prima della dipendenza.", "Déjà-vu"];
    return [fb, -1];
  }
  used.push(idx);
  return [items[idx], idx];
}
function timeStr(s) { return String(Math.floor(s/60)).padStart(2,'0') + ':' + String(s%60).padStart(2,'0'); }
function getUnlocked() { try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]'); } catch { return []; } }
function unlockFinal(name) {
  const u = getUnlocked();
  if (!u.includes(name)) { u.push(name); localStorage.setItem(STORAGE_KEY, JSON.stringify(u)); }
}

function updateIQ(delta, reason='') {
  if (gameOver) return;

  if (iq < minIQ) minIQ = iq;
  updateIQDisplay();
  if (reason) showToast((delta > 0 ? '+' : '') + delta + ' QI — ' + reason, delta > 0 ? 'good' : 'bad');

function normalizeQuiz(q) {
  if (q && Array.isArray(q.opts)) return q;
  // Backward compatibility: some older 2-choice polls still exist in the pool.
  // Convert them into the new 4-choice format so one legacy item cannot crash the preview.
  if (q && typeof q.right === 'string' && typeof q.wrong === 'string') {
    return {
      q: q.q || 'Sondaggio non caricato correttamente. Cosa fai?',
      opts: [
        {t: q.right, d: 2, k: 'conscious', fb: q.fb || 'risposta consapevole'},
        {t: 'Non saprei, ma almeno ci penso', d: 0, k: 'neutral', fb: 'neutralità dignitosa'},
        {t: q.wrong, d: -1, k: 'stupid', fb: q.fb || 'scelta discutibile'},
        {t: 'Apro altre 14 notizie per decidere', d: -3, k: 'idiot', fb: 'hai trasformato il dubbio in carburante'}
      ]
    };
  }
  // Last-resort fallback: keep the game alive instead of killing the feed.
  return {
    q: 'Il feed ha perso il sondaggio. Reazione?',
    opts: [
      {t:'Chiudo e salvo la sanità mentale', d:2, k:'conscious', fb:'hai scelto la via improbabile'},
      {t:'Segnalo il bug mentalmente', d:0, k:'neutral', fb:'ticket non aperto'},
      {t:'Continuo come se nulla fosse', d:-1, k:'stupid', fb:'resilienza o negazione'},
      {t:'Clicco tutto più forte', d:-3, k:'idiot', fb:'debugging da primate'}
    ]
  };
}

function setBrainrotButton(btn) {
  const n = recentLoadClicks.length;
  let level = 0, label = '↓ carica altro (sì, davvero)';
  if (n >= 25) { level = 4; label = '↓ TUNG TUNG TUNG'; }
  else if (n >= 20) { level = 3; label = '↓ tung?'; }
  else if (n >= 15) { level = 2; label = '↓ ANCORA'; }
  else if (n >= 10) { level = 1; label = '↓ ancora uno'; }
  brainrotLevel = Math.max(brainrotLevel, level);
  btn.textContent = label;
  btn.className = 'load-more' + (level ? ' glitch-' + Math.min(level,3) : '');

function onLoadMore(btn, event) {
  if (gameOver) return;
  const now = Date.now();
  const fastAgain = lastLoadClickAt && (now - lastLoadClickAt < 650);
  lastLoadClickAt = now;
  if (fastAgain || (event && event.detail >= 2)) {
    doubleClickStreak++;
    brainrotLevel = Math.max(brainrotLevel, Math.min(4, doubleClickStreak));
    showToast('doppio impulso registrato: stabilità semantica in calo', 'bad');
  } else {
    doubleClickStreak = Math.max(0, doubleClickStreak - 1);
  }
  recentLoadClicks.push(now);
  recentLoadClicks = recentLoadClicks.filter(t => now - t < 60000);
  setBrainrotButton(btn);
  if ((recentLoadClicks.length >= 24 && brainrotLevel >= 3) || doubleClickStreak >= 4) { triggerEnding('brainrot'); return; }
  totalLoadMore++;
  loadsSinceAd++;
  spendScrollIQ();
  if (gameOver) return;
  btn.remove();

  try {
    const newsToAdd = 6 + Math.floor(Math.random()*2);
    const mustShowAd = adsShown < 4 || loadsSinceAd >= 2;
    const mustShowQuiz = totalLoadMore <= 3 || (totalLoadMore % 2 === 0);
    for (let i = 0; i < newsToAdd; i++) {
      addNewsCard(brainrotLevel >= 3 && i === newsToAdd-1);
      if (i === 1 && mustShowQuiz) addQuizCard();
      if (i === 3 && mustShowAd) addAdCard();
    }
  } catch (err) {
    console.error('Errore generazione feed:', err);
    showToast('Il feed ha tossito. Ho salvato il bottone prima che sparisse.', 'bad');
  } finally {
    if (!gameOver) {
      addLoadMore();
      const btns = feed.querySelectorAll('.load-more');
      if (btns.length) setBrainrotButton(btns[btns.length-1]);
    }
  }
}

function scheduleNextBrain(mode='neutral') {
  // Circa 40% più frequente rispetto alla v2.5.
  // Se lo ignori resta più raro del percorso buono, ma diventa anche più cattivo.
  let delay;
  if (mode === 'listen') delay = Math.min(27000, 13000 + brainListened * 3600);
  else if (mode === 'ignore') delay = Math.min(108000, 51000 + brainIgnored * 18000);
  else delay = 15000;
  if (brainTimerId) clearTimeout(brainTimerId);
  brainTimerId = setTimeout(() => { if (!gameOver) showBrainPopup(); }, delay);
}

  const overlay = document.getElementById('endingOverlay');
  overlay.className = 'ending-overlay active ' + (type === 'quit' ? 'smetti' : type === 'capitalismo' ? 'cervello' : type);
  const stats = `<div class="ending-stats"><div><span>tempo perso</span><span>${timeStr(seconds)}</span></div><div><span>QI finale</span><span>${iq}/100</span></div><div><span>cose viste</span><span>${newsCount}</span></div><div><span>cervello ascoltato</span><span>${brainListened}x</span></div><div><span>cervello ignorato</span><span>${brainIgnored}x</span></div><div><span>annunci cliccati</span><span>${adClicks}x</span></div></div><div class="ending-progress">finale ${unlocked.length} di 5 sbloccato</div><div class="ending-finals">${finalsList}</div><button class="ending-restart" onclick="restartGame()">ricomincia</button>`;
  let html = '';
  if (type === 'nirvana') {
    html = `<div class="floating-emojis" id="floatingEmojis"></div><div class="ending-emoji">🧘</div><h1>NIRVANA RAGGIUNTO</h1><p>il tuo QI è zero ✨</p><p>Hai raggiunto la pace perché non hai più strumenti per distinguere pace e resa.</p><p>non sai più preoccuparti di nulla. né del clima, né del lavoro, né del fatto che hai dimenticato il forno acceso da ieri sera 🌸</p><p>hai trasceso il pensiero. hai trasceso anche la grammatica. comunichi solo per emoji ora 🌼</p>${stats}`;
    overlay.innerHTML = html;
    spawnEmojis();
    playZenSound();
  } else if (type === 'smetti') {
    html = `<h1>Hai chiuso l'app.</h1><p>Il cervello te l’ha ricordato tre volte. Alla terza, incredibilmente, non hai negoziato con il bottone.</p><p>Sei andato a bere un bicchiere d'acqua. Hai aperto la finestra. Hai annaffiato la pianta che stava morendo da settimane.</p><p>Non hai vinto contro internet. Hai solo lasciato la stanza prima che internet iniziasse il secondo tempo.</p><p style="margin-top:20px;color:#888;">Niente di magico. Solo vita normale.</p>${stats}`;
    overlay.innerHTML = html;
  } else if (type === 'quit') {
    html = `<h1>QUIT DEFINITIVO</h1><p>Hai chiuso l’app. Poi hai chiuso le notifiche. Poi hai disinstallato tre app che ti chiamavano “utente attivo mensile”.</p><p>Nei giorni dopo hai scoperto una cosa inquietante: il mondo continua anche se non lo aggiorni ogni 7 minuti.</p><p>Hai dormito. Hai risposto ai messaggi. Hai finito una cosa iniziata.</p><p>Non sei diventato una persona migliore. Sei diventato una persona meno interrotta.</p><p style="margin-top:20px;font-weight:500;">Questa, a quanto pare, era già una forma di superpotere.</p>${stats}`;
    overlay.innerHTML = html;
  } else if (type === 'capitalismo') {
    html = `<h1>CAPITALISMO SPIRITUALE</h1><p>Hai sconfitto il doomscrolling.</p><p>Non chiudendo l’app. Non andando a dormire. Non ascoltando davvero il tuo cervello.</p><p>Hai risolto il problema comprando: una app, un corso, un ritiro, un planner e un abbonamento annuale con rinnovo automatico.</p><p>Ora non scrolli più per ansia. Scrolli per confrontare metodi per non scrollare.</p><p style="margin-top:20px;font-weight:500;">Il tuo QI è salvo. Il tuo conto no.</p><p style="font-size:13px;opacity:.72;">La tua pace interiore ora ha una dashboard.</p>${stats}`;
    overlay.innerHTML = html;
  } else if (type === 'brainrot') {
    html = `<h1>BRAINROT™</h1><p>Hai cliccato troppo velocemente.</p><p>Il feed non riesce più a produrre significato. Ora produce solo stimoli.</p><p style="margin-top:16px;">uomo fa cosa<br>esperto dice boh<br>internet arrabbiato<br>guarda questo<br>ancora<br>ANCORA</p><p style="margin-top:20px;font-size:22px;line-height:1.6;">TUNG TUNG TUNG SAHUR<br>TRALALERO TRALALÀ<br>BRR BRR PATAPIM<br>BALLERINA CAPPUCCINA<br>BOMBARDIRO CROCODILO</p><p style="margin-top:20px;">Il tuo cervello non legge più. Riconosce solo pattern.</p><p>La frase lunga è morta. Viva il suono.</p><p style="margin-top:16px;font-size:24px;">💀</p>${stats}`;
    overlay.innerHTML = html;
    playGlitchSound();
  }
}

function playZenSound() {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    [261.63, 329.63, 392.00].forEach((freq, i) => {
      const o = ctx.createOscillator();
      const g = ctx.createGain();
      o.frequency.value = freq;
      o.type = 'sine';
      o.connect(g); g.connect(ctx.destination);
      g.gain.setValueAtTime(0, ctx.currentTime + i*0.3);
      g.gain.linearRampToValueAtTime(0.15, ctx.currentTime + i*0.3 + 0.05);
      g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + i*0.3 + 3);
      o.start(ctx.currentTime + i*0.3);
      o.stop(ctx.currentTime + i*0.3 + 3);
    });
  } catch(e) {}
}
function playGlitchSound() {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    for (let i = 0; i < 8; i++) {
      const o = ctx.createOscillator();
      const g = ctx.createGain();
      o.frequency.value = 80 + Math.random()*400;
      o.type = 'square';
      o.connect(g); g.connect(ctx.destination);
      g.gain.setValueAtTime(0.08, ctx.currentTime + i*0.08);
      g.gain.linearRampToValueAtTime(0, ctx.currentTime + i*0.08 + 0.05);
      o.start(ctx.currentTime + i*0.08);
      o.stop(ctx.currentTime + i*0.08 + 0.05);
    }
  } catch(e) {}
}
function spawnEmojis() {
  const emojis = ['🌸','🧘','✨','🌼','🕉️','🪷','💆','☮️','🌿'];
  const container = document.getElementById('floatingEmojis');
  for (let i = 0; i < 25; i++) {
    const span = document.createElement('span');
    span.textContent = emojis[Math.floor(Math.random()*emojis.length)];
    span.style.left = Math.random()*100 + '%';
    span.style.animationDuration = (4 + Math.random()*5) + 's';
    span.style.animationDelay = (Math.random()*3) + 's';
    span.style.fontSize = (24 + Math.random()*32) + 'px';
    container.appendChild(span);
  }
}

function resetStateForNewRun() {
  iq = 100; minIQ = 100; seconds = 0; newsCount = 0;
  brainListened = 0; brainListenedStreak = 0; brainIgnored = 0; everIgnored = false;
  cardsSinceInterruption = 0; recentLoadClicks = []; gameOver = false; totalLoadMore = 0;
  adClicks = 0; usefulAdClicks = 0; spiritualDebt = 0; adsShown = 0; loadsSinceAd = 0; brainrotLevel = 0; doubleClickStreak = 0; lastLoadClickAt = 0; scrollLossDebt = 0; interruptionCount = 0;
  mehUsed = []; intUsed = []; peakUsed = []; adUsed = []; quizUsed = []; brainrotUsed = [];
  feed.innerHTML = '';
  document.getElementById('endingOverlay').className = 'ending-overlay';
  document.getElementById('endingOverlay').innerHTML = '';
  document.getElementById('brainOverlay').classList.remove('active');
  document.getElementById('shopOverlay')?.classList.remove('active');
  pendingPromo = null; pendingPromoElement = null;
  document.getElementById('timerVal').textContent = '00:00';
  document.getElementById('newsCount').textContent = '0';
  updateIQDisplay();
}

function restartGame() {
  if (mainTimerId) clearInterval(mainTimerId);
  if (brainTimerId) clearTimeout(brainTimerId);
  resetStateForNewRun();
  init();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function init() {
  // Primo annuncio quasi subito e molto visibile: gli ads sono una meccanica, non decorazione.
  addNewsCard();
  addAdCard();
  for (let i = 0; i < 3; i++) addNewsCard();
  addQuizCard();
  addNewsCard();
  addLoadMore();
  mainTimerId = setInterval(() => {
    if (gameOver) return;
    seconds++;
    document.getElementById('timerVal').textContent = timeStr(seconds);
    if (seconds % 16 === 0) updateIQ(-1, 'esposizione passiva al nulla, goccia dopo goccia');
    document.getElementById('liveDot').style.opacity = seconds % 2 === 0 ? '1' : '0.3';
  }, 1000);
  scheduleNextBrain('neutral');
}
init();
</script>
